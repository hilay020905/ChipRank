version: '3.9'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    volumes:
      - uploads_data:/app/uploads
      - temp_data:/app/temp
    environment:
      - PORT=3001
      - FRONTEND_ORIGIN=*
    restart: unless-stopped

volumes:
  uploads_data:
  temp_data:
